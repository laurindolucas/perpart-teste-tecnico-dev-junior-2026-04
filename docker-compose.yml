version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: desafio_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: desafio_db
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - desafio_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: desafio_backend
    restart: always
    env_file:
      - ./backend/.env
    ports:
      - '3001:3001'
    depends_on:
      - db
    networks:
      - desafio_net
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: desafio_frontend
    restart: always
    ports:
      - '3000:3000'
    depends_on:
      - backend
    networks:
      - desafio_net
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pgdata:

networks:
  desafio_net:
    driver: bridge